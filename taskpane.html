<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>My Basic Add-in</title>
    <!-- <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script> -->
    <script
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.debug.js"
      type="text/javascript"
    ></script>
    <link rel="stylesheet" href="taskpane.css" />
    <script src="helpers.js"></script>
    <script src="errorHelpers.js"></script>
    <script src="taskpane.js"></script>
  </head>
  <body>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Generating Gantt Chart...</div>
    </div>
    <div id="error-toast" class="error-toast" style="display: none">
      <div class="toast-content">
        <span id="toast-message"></span>
        <button
          onclick="
            document.getElementById('error-toast').style.display = 'none'
          "
        >
          ✕
        </button>
      </div>
      <a id="toast-link" href="#" target="_blank" style="display: none"
        >Learn More</a
      >
    </div>
    <div id="app-body">
      <h1>Welcome!</h1>
      <div class="input-section">
        <div class="input-group">
          <label for="input-width">Chart width</label>
          <input type="number" id="input-width" value="400" min="0" step="1" />
        </div>

        <div class="input-group">
          <label for="input-height">Bar height</label>
          <input type="number" id="input-height" value="20" min="0" step="1" />
        </div>
        <div class="input-group">
          <label for="barHeight">Bar Height:</label>
          <input type="number" id="barHeight" value="40" />
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="includeFY" name="includeFY" checked/>
          <label for="includeFY">Include fiscal year ("FY") labels</label>
        </div>
        <div class="input-group">
          <label for="input-color">Bar color</label>
          <div class="color-picker-wrapper">
            <input type="color" id="input-color" value="#E30046" />
            <span id="color-hex-label">#E30046</span>
          </div>
        </div>
      </div>
      <div class="input-section">
        <div class="action-links">
          <button id="reset-btn" class="ms-Link">Reset to defaults</button>
        </div>
      </div>

      <button id="create-chart-btn" class="ms-Button">
        <span class="ms-Button-label">Create chart</span>
      </button>
      <br />
      <br />
      <button
        onclick="handleReformatButtonClick()"
        id="reformat-resized-chart-btn"
        class="ms-Button"
      >
        <span class="ms-Button-label">Reformat chart to new size</span>
      </button>
      <br />
      <br />
      <button onclick="cleanUpUngroupedShapes()">
        Remove ungrouped shapes
      </button>
      <br />
      <br />
      <button onclick="runGanttDiagnostic()">Run diagnostic</button>
    </div>

    <canvas
      id="myCanvas"
      width="600"
      height="600"
      style="border: 1px solid #000; display: none"
    ></canvas>
  </body>
</html>
